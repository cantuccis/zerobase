# Cross-compilation configuration for zerobase.
#
# Used by `cross` (https://github.com/cross-rs/cross) to build statically
# linked binaries for multiple targets.
#
# Supported targets:
#   - x86_64-unknown-linux-gnu     (Linux amd64)
#   - aarch64-unknown-linux-gnu    (Linux arm64)
#   - x86_64-apple-darwin          (macOS amd64)  — requires native or osxcross
#   - aarch64-apple-darwin         (macOS arm64)  — requires native or osxcross
#   - x86_64-pc-windows-gnu       (Windows amd64)

[build.env]
passthrough = [
    "ZEROBASE_BUILD_DATE",
]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:main"

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"

[target.x86_64-pc-windows-gnu]
image = "ghcr.io/cross-rs/x86_64-pc-windows-gnu:main"
